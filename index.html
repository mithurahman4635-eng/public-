<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Mithu Cloud</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 300px; border: 1px solid #334155; }
        img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #38bdf8; margin-bottom: 1rem; }
        h2 { margin: 0.5rem 0; color: #38bdf8; }
        p { color: #94a3b8; font-size: 0.9rem; }
        .links { margin-top: 1.5rem; }
        .link { display: block; background: #334155; color: white; text-decoration: none; padding: 0.7rem; margin: 0.5rem 0; border-radius: 0.5rem; transition: 0.3s; }
        .link:hover { background: #38bdf8; color: #0f172a; font-weight: bold; }
        .badge { font-size: 0.7rem; background: #38bdf8; color: #0f172a; padding: 2px 8px; border-radius: 10px; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/100" alt="Profile">
        <h2>Mithu Bhai</h2>
        <p>Full Stack Developer & Content Creator</p>
        <div class="badge">Deployed via Mithu Cloud</div>
        <div class="links">
            <a href="#" class="link">Facebook</a>
            <a href="#" class="link">GitHub</a>
            <a href="#" class="link">YouTube</a>
        </div>
    </div>
</body>
</html>
